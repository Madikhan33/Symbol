  <text x="90" y="170" fill="url(#accent)" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="4">SYMBOL MEMORY</text>
  <text x="94" y="213" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">Explicit symbol graph for Python codebases, agents, and tools</text>
  <text x="94" y="246" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">Manual semantics. AST structure. Fast id-based navigation.</text>

